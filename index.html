<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrsusMan - Em Construção</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      background: #040d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── CANVAS BACKGROUND ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── GRADIENT OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(29, 78, 180, 0.25) 0%, transparent 70%),
                  radial-gradient(ellipse at 80% 80%, rgba(10, 30, 90, 0.4) 0%, transparent 60%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── CONTENT ── */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 32px 20px 48px;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    /* ── LOGO ── */
    .logo {
      width: min(280px, 70vw);
      filter: drop-shadow(0 0 32px rgba(74, 144, 226, 0.6)) drop-shadow(0 4px 16px rgba(0,0,0,0.5));
      animation: float 4s ease-in-out infinite;
      margin-bottom: 8px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* ── TITLE ── */
    .title {
      font-size: clamp(22px, 5.5vw, 42px);
      font-weight: 900;
      color: #f5c842;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.2;
      text-shadow:
        0 0 20px rgba(245, 200, 66, 0.8),
        0 0 40px rgba(245, 200, 66, 0.4),
        0 2px 8px rgba(0,0,0,0.6);
      animation: glow 3s ease-in-out infinite;
      margin-bottom: 10px;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(245,200,66,0.8), 0 0 40px rgba(245,200,66,0.4), 0 2px 8px rgba(0,0,0,0.6); }
      50%       { text-shadow: 0 0 30px rgba(245,200,66,1),   0 0 60px rgba(245,200,66,0.6), 0 2px 8px rgba(0,0,0,0.6); }
    }

    .subtitle {
      font-size: clamp(13px, 3vw, 17px);
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ── BEAR ── */
    .bear {
      width: min(280px, 68vw);
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7));
      animation: float 4s ease-in-out infinite 1s;
      margin-bottom: 32px;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f5c842, transparent);
      margin: 0 auto 28px;
    }

    /* ── SOCIAL ── */
    .social-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 14px;
    }

    .social-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1.5px solid rgba(74, 144, 226, 0.35);
      background: rgba(74, 144, 226, 0.08);
      color: #7ab8ff;
      text-decoration: none;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s, background 0.25s;
      box-shadow: 0 0 10px rgba(74, 144, 226, 0.15), inset 0 0 10px rgba(74,144,226,0.05);
    }
    .social-link:hover {
      transform: translateY(-4px) scale(1.1);
      border-color: rgba(245, 200, 66, 0.8);
      background: rgba(245, 200, 66, 0.12);
      color: #f5c842;
      box-shadow: 0 0 20px rgba(245, 200, 66, 0.5), 0 8px 24px rgba(0,0,0,0.4);
    }
    .social-link svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* ── TERMO BUTTON ── */
    .termo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .termo-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .btn-termo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 100px;
      background: linear-gradient(135deg, #f5c842 0%, #c9991a 100%);
      color: #0a1628;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: 0.5px;
      box-shadow: 0 0 24px rgba(245, 200, 66, 0.45), 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-termo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
      border-radius: inherit;
    }
    .btn-termo:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 40px rgba(245, 200, 66, 0.7), 0 12px 32px rgba(0,0,0,0.5);
      filter: brightness(1.05);
    }
    .btn-termo:active { transform: scale(0.97); }
    .btn-termo svg {
      width: 22px;
      height: 22px;
      fill: #0a1628;
      flex-shrink: 0;
    }

    @media (max-width: 400px) {
      .social-link { width: 42px; height: 42px; }
      .social-link svg { width: 18px; height: 18px; }
      .social-bar { gap: 10px; }
    }
  </style>
</head>

<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');

  const COLORS = ['#1a4fc4','#0d2f7a','#2d6bc4','#0a1f4e','#133580','#4a90e2'];
  const PARTICLE_COUNT = 80;

  let W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 3 + 1,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      alpha: Math.random() * 0.5 + 0.15,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: PARTICLE_COUNT }, randomParticle);
  }

  let t = 0;
  function draw() {
    t += 0.004;

    // gradient background
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#040d1a');
    grad.addColorStop(0.5, `hsl(${220 + Math.sin(t) * 8}, 60%, ${8 + Math.sin(t * 0.7) * 2}%)`);
    grad.addColorStop(1, '#060f22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // subtle wave lines
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(0, H * (0.3 + i * 0.15));
      for (let x = 0; x <= W; x += 8) {
        const y = H * (0.3 + i * 0.15) + Math.sin(x * 0.006 + t + i * 1.2) * (20 + i * 8);
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(29, 78, 180, ${0.07 - i * 0.015})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2, '0');
      ctx.fill();
    });

    // glow spots
    for (let i = 0; i < 3; i++) {
      const gx = W * (0.2 + i * 0.3) + Math.sin(t * 0.5 + i * 2) * 60;
      const gy = H * (0.3 + i * 0.2) + Math.cos(t * 0.4 + i) * 50;
      const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, 140);
      gr.addColorStop(0, `rgba(29, 78, 200, 0.06)`);
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(gx, gy, 140, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
</script>
