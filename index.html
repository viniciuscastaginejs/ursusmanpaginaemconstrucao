<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  const COLORS = ['#1a4fc4','#0d2f7a','#2d6bc4','#0a1f4e','#133580','#4a90e2'];
  let W, H, particles, t = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomParticle() {
    return {
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 2.5 + 0.8,
      vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
      alpha: Math.random() * 0.45 + 0.12,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    };
  }

  function init() { resize(); particles = Array.from({ length: 70 }, randomParticle); }

  function draw() {
    t += 0.004;
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#040d1a');
    grad.addColorStop(0.5, `hsl(${220 + Math.sin(t) * 8}, 60%, ${8 + Math.sin(t * 0.7) * 2}%)`);
    grad.addColorStop(1, '#060f22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(0, H * (0.3 + i * 0.15));
      for (let x = 0; x <= W; x += 8) {
        ctx.lineTo(x, H * (0.3 + i * 0.15) + Math.sin(x * 0.006 + t + i * 1.2) * (18 + i * 7));
      }
      ctx.strokeStyle = `rgba(29, 78, 180, ${0.07 - i * 0.015})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2, '0');
      ctx.fill();
    });

    for (let i = 0; i < 3; i++) {
      const gx = W * (0.2 + i * 0.3) + Math.sin(t * 0.5 + i * 2) * 55;
      const gy = H * (0.3 + i * 0.2) + Math.cos(t * 0.4 + i) * 45;
      const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, 130);
      gr.addColorStop(0, 'rgba(29, 78, 200, 0.055)');
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(gx, gy, 130, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  draw();
</script>
